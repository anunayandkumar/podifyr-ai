name: 🐛 Bug report
description: Report something that is broken or behaves unexpectedly.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        sections below — the more detail, the faster we can help.

  - type: checkboxes
    id: prereqs
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
        - label: I am running the latest released version of `podifyr-ai`.
          required: true

  - type: input
    id: version
    attributes:
      label: podifyr-ai version
      description: Output of `podifyr-ai --version`
      placeholder: "2026.06.13"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.4"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Docker
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `podifyr-ai generate ./my-project --provider openai …`
        2. …
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / traceback
      render: shell
