name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
template: |
  ## What's changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: "🚀 Features"
    labels: ["feature", "enhancement"]
  - title: "🐛 Bug fixes"
    labels: ["fix", "bug"]
  - title: "📚 Documentation"
    labels: ["documentation", "docs"]
  - title: "🔒 Security"
    labels: ["security"]
  - title: "🧰 Maintenance"
    labels: ["chore", "refactor", "ci", "build", "dependencies"]
  - title: "⚠️ Breaking changes"
    labels: ["breaking-change"]

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: ["breaking-change", "major"]
  minor:
    labels: ["feature", "enhancement", "minor"]
  patch:
    labels: ["fix", "bug", "security", "patch", "chore", "documentation", "dependencies"]
  default: patch

exclude-labels:
  - "skip-changelog"

autolabeler:
  - label: "documentation"
    files: ["docs/**", "*.md"]
  - label: "ci"
    files: [".github/**"]
  - label: "dependencies"
    files: ["pyproject.toml", ".github/dependabot.yml"]
  - label: "feature"
    title:
      - "/^feat(\\(.+\\))?:/i"
  - label: "fix"
    title:
      - "/^fix(\\(.+\\))?:/i"
  - label: "chore"
    title:
      - "/^chore(\\(.+\\))?:/i"
