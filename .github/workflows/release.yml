name: Release

# Enterprise-grade release flow:
#   1. Triggered by pushing a `v*` tag (e.g. `v2026.06.13`) OR manually.
#   2. Builds wheel + sdist (reproducibly, in a clean container).
#   3. Runs `twine check --strict`.
#   4. Generates a CycloneDX SBOM.
#   5. Publishes to **TestPyPI** via PyPI Trusted Publishing (OIDC, no tokens).
#   6. Smoke-tests the TestPyPI install on a fresh runner.
#   7. Publishes to **PyPI** via OIDC (gated on the TestPyPI smoke test).
#   8. Signs the wheels & sdist with Sigstore and attaches everything to a
#      GitHub Release with auto-generated notes.
#
# Setup required (one-time, per repo) on PyPI/TestPyPI:
#   https://docs.pypi.org/trusted-publishers/
#     - Project name:      podifyr-ai
#     - Owner:             anunayandkumar
#     - Repository:        podifyr-ai
#     - Workflow filename: release.yml
#     - Environment:       pypi  (and `testpypi` on TestPyPI)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip-testpypi:
        description: "Skip TestPyPI and publish straight to PyPI"
        type: boolean
        default: false
      dry-run:
        description: "Build and check artifacts only — do not publish"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Re-run quality + test gates before any artifact is built. We never want
  # to release something that hasn't passed CI on this exact ref.
  # ─────────────────────────────────────────────────────────────────────────
  guard:
    name: Pre-release guard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/podifyr

      - name: Tests
        run: pytest tests/ -n auto

  # ─────────────────────────────────────────────────────────────────────────
  # Build distributions in a clean environment.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build distribution
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for hatch-vcs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        env:
          SOURCE_DATE_EPOCH: "1700000000"  # reproducible builds
        run: python -m build

      - name: Resolve built version
        id: version
        run: |
          version=$(ls dist/*.whl | sed -E 's/.*-([0-9][^-]*)-.*/\1/' | head -n1)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Built version: $version"

      - name: Validate metadata
        run: twine check --strict dist/*

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: cyclonedx-json
          output-file: dist/sbom.cyclonedx.json
          upload-artifact: false

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 30
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # Publish to TestPyPI via Trusted Publishing (OIDC). Uses a dedicated
  # GitHub Environment so reviewers / protection rules can be configured.
  # ─────────────────────────────────────────────────────────────────────────
  publish-testpypi:
    name: Publish → TestPyPI
    needs: build
    if: ${{ !inputs.skip-testpypi && !inputs.dry-run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/project/podifyr-ai/${{ needs.build.outputs.version }}/
    permissions:
      id-token: write  # OIDC for PyPI Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Strip non-publishable files
        run: rm -f dist/sbom.cyclonedx.json

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          print-hash: true

  # ─────────────────────────────────────────────────────────────────────────
  # Smoke test: install from TestPyPI, run `--version` and `--help`.
  # ─────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test (TestPyPI install)
    needs: [build, publish-testpypi]
    if: ${{ !inputs.skip-testpypi && !inputs.dry-run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from TestPyPI (with PyPI fallback for deps)
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          # Retry to give TestPyPI's CDN a moment to propagate.
          for i in 1 2 3 4 5; do
            if pip install \
                 --index-url https://test.pypi.org/simple/ \
                 --extra-index-url https://pypi.org/simple/ \
                 "podifyr-ai==$VERSION"; then
              break
            fi
            echo "Install attempt $i failed, retrying in 15s…"
            sleep 15
          done

      - name: Verify CLI
        run: |
          podifyr-ai --version
          podifyr-ai --help

  # ─────────────────────────────────────────────────────────────────────────
  # Publish to production PyPI (gated on smoke test).
  # ─────────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish → PyPI
    needs: [build, smoke-test]
    # When skip-testpypi=true, depend only on build; when dry-run, skip entirely.
    if: |
      !inputs.dry-run && (
        success() ||
        (inputs.skip-testpypi && needs.build.result == 'success')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/podifyr-ai/${{ needs.build.outputs.version }}/
    permissions:
      id-token: write  # OIDC for PyPI Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Strip non-publishable files
        run: rm -f dist/sbom.cyclonedx.json

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

  # ─────────────────────────────────────────────────────────────────────────
  # Sign artifacts with Sigstore and attach to a GitHub Release.
  # Only runs on real tag pushes.
  # ─────────────────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [build, publish-pypi]
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !inputs.dry-run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # create releases & upload assets
      id-token: write   # Sigstore keyless signing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Sign with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: |
            ./dist/*.tar.gz
            ./dist/*.whl

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag

      - name: Upload signed artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            dist/*
