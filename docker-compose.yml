services:
  podifyr:
    build: .
    volumes:
      - ./output:/workspace/output
      - ./target_repo:/workspace/target_repo:ro
    command:
      - "generate"
      - "/workspace/target_repo"
      - "--provider"
      - "openai"
      - "--api-key"
      - "${OPENAI_API_KEY}"
      - "--output"
      - "/workspace/output"
